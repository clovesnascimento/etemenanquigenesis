<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
<rect width="500" height="500" fill="#0A0C0E"/>
<defs>
  <linearGradient id="beam" x1="0%" y1="100%" x2="0%" y2="0%">
    <stop offset="0%"   stop-color="#EF9F27" stop-opacity="0.7"/>
    <stop offset="100%" stop-color="#FCDE5A" stop-opacity="0.0"/>
  </linearGradient>
  <linearGradient id="blockGrad" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%"   stop-color="#1C1608"/>
    <stop offset="100%" stop-color="#110E05"/>
  </linearGradient>
  <filter id="glow">
    <feGaussianBlur stdDeviation="2.5" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>

<polygon points="247,345 253,345 253,75 247,75" fill="url(#beam)"/>

<rect x="100" y="340" width="300" height="26" rx="2" fill="url(#blockGrad)" stroke="#EF9F27" stroke-width="1.2"/>
<line x1="142" y1="340" x2="142" y2="366" stroke="#EF9F27" stroke-width="1" stroke-opacity="0.4"/>
